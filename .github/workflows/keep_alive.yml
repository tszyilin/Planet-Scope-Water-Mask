name: Keep App Alive

on:
  schedule:
    # Ping every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: pip install playwright && playwright install chromium --with-deps

      - name: Wake up and log in to Planet Scope Viewer
        run: |
          python3 - <<'EOF'
          from playwright.sync_api import sync_playwright
          import time

          URL      = "https://planet-scope-water-mask-ruimdlgrctxawn9uyvmer2.streamlit.app/"
          USERNAME = "PSM_water"
          PASSWORD = "PSMsurfacewater"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()

              print(f"Opening {URL} ...")
              page.goto(URL, timeout=90000, wait_until="domcontentloaded")
              time.sleep(30)   # wait for Streamlit React to fully render

              # Click wake-up button if the app is sleeping
              try:
                  btn = page.get_by_text("Yes, get this app back up!", exact=False)
                  if btn.is_visible():
                      btn.click()
                      print("Clicked wake-up button — waiting for app to start...")
                      time.sleep(30)
              except Exception:
                  pass

              # Debug: list every input found on the page
              all_inputs = page.locator('input').all()
              print(f"Inputs found on page: {len(all_inputs)}")
              for i, inp in enumerate(all_inputs):
                  try:
                      print(f"  [{i}] type={inp.get_attribute('type')} visible={inp.is_visible()}")
                  except Exception:
                      pass

              # Take a screenshot so we can see what the page looks like
              page.screenshot(path="/tmp/page.png")
              print("Screenshot saved to /tmp/page.png")

              # Try to log in using whatever inputs are visible
              try:
                  visible_inputs = [inp for inp in all_inputs if inp.is_visible()]
                  if len(visible_inputs) >= 2:
                      visible_inputs[0].fill(USERNAME)
                      visible_inputs[1].fill(PASSWORD)
                      page.get_by_role("button", name="Log in").click()
                      print("Logged in ✅")
                  elif len(visible_inputs) == 1:
                      print("Only 1 input visible — cannot fill login form yet")
                  else:
                      print("No visible inputs found")
              except Exception as e:
                  print(f"Login failed: {e}")

              print(f"Page title: {page.title()}")
              print("App is awake ✅")
              browser.close()
          EOF
