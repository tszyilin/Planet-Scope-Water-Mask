name: Keep App Alive

on:
  schedule:
    # Ping every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: pip install playwright && playwright install chromium --with-deps

      - name: Wake up and log in to Planet Scope Viewer
        run: |
          python3 - <<'EOF'
          from playwright.sync_api import sync_playwright
          import time

          URL      = "https://planet-scope-water-mask-ruimdlgrctxawn9uyvmer2.streamlit.app/"
          USERNAME = "PSM_water"
          PASSWORD = "PSMsurfacewater"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()

              print(f"Opening {URL} ...")
              page.goto(URL, timeout=90000, wait_until="domcontentloaded")
              time.sleep(30)   # wait for Streamlit React to fully render

              # Click wake-up button if the app is sleeping
              try:
                  btn = page.get_by_text("Yes, get this app back up!", exact=False)
                  if btn.is_visible():
                      btn.click()
                      print("Clicked wake-up button — waiting for app to start...")
                      time.sleep(30)
              except Exception:
                  pass

              # Streamlit renders the app inside an iframe — find it
              app_frame = None
              for frame in page.frames:
                  if frame.url != page.url and frame.url.startswith("http"):
                      print(f"Found frame: {frame.url}")
                      app_frame = frame
                      break

              target = app_frame if app_frame else page
              print(f"Using {'iframe' if app_frame else 'main page'}")

              # Try to log in
              try:
                  target.wait_for_selector('input[type="text"]', timeout=30000)
                  target.locator('input[type="text"]').fill(USERNAME)
                  target.locator('input[type="password"]').fill(PASSWORD)
                  target.get_by_role("button", name="Log in").click()
                  print("Logged in ✅")
                  time.sleep(5)
              except Exception as e:
                  print(f"Login failed: {e}")

              print(f"Page title: {page.title()}")
              print("App is awake ✅")
              browser.close()
          EOF
