name: Keep App Alive

on:
  schedule:
    # Ping every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Planet Scope Viewer
        run: |
          python3 - <<'EOF'
          import urllib.request
          import time

          url = "https://planet-scope-water-mask.streamlit.app/"

          # Use browser-like headers so Streamlit Cloud counts it as a real visitor
          req = urllib.request.Request(url, headers={
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                  "AppleWebKit/537.36 (KHTML, like Gecko) "
                  "Chrome/124.0.0.0 Safari/537.36"
              ),
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "en-US,en;q=0.5",
          })

          for attempt in range(1, 4):
              try:
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      print(f"Attempt {attempt}: HTTP {resp.status} — app is awake ✅")
                      break
              except Exception as e:
                  print(f"Attempt {attempt} failed: {e}")
                  if attempt < 3:
                      time.sleep(15)
          EOF
