name: Keep App Alive

on:
  schedule:
    # Ping every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: pip install playwright && playwright install chromium --with-deps

      - name: Wake up Planet Scope Viewer
        run: |
          python3 - <<'EOF'
          from playwright.sync_api import sync_playwright
          import time

          URL = "https://planet-scope-water-mask.streamlit.app/"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()

              print(f"Opening {URL} ...")
              page.goto(URL, timeout=60000, wait_until="domcontentloaded")
              time.sleep(5)

              # If Streamlit shows a "sleeping" screen, click the wake-up button
              try:
                  btn = page.get_by_text("Yes, get this app back up!", exact=False)
                  if btn.is_visible():
                      btn.click()
                      print("Clicked wake-up button — waiting for app to start...")
                      page.wait_for_load_state("networkidle", timeout=60000)
              except Exception:
                  pass   # Button not present — app was already awake

              title = page.title()
              print(f"Page title: {title}")
              print("App is awake ✅")
              browser.close()
          EOF
