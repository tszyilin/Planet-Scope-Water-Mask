name: Keep App Alive

on:
  schedule:
    # Ping every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: pip install playwright && playwright install chromium --with-deps

      - name: Wake up and log in to Planet Scope Viewer
        run: |
          python3 - <<'EOF'
          from playwright.sync_api import sync_playwright
          import time

          URL      = "https://planet-scope-water-mask-ruimdlgrctxawn9uyvmer2.streamlit.app/"
          USERNAME = "PSM_water"
          PASSWORD = "PSMsurfacewater"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()

              print(f"Opening {URL} ...")
              page.goto(URL, timeout=90000, wait_until="domcontentloaded")
              time.sleep(30)   # wait for Streamlit React to fully render

              # Click wake-up button if the app is sleeping
              try:
                  btn = page.get_by_text("Yes, get this app back up!", exact=False)
                  if btn.is_visible():
                      btn.click()
                      print("Clicked wake-up button — waiting for app to start...")
                      time.sleep(30)
              except Exception:
                  pass

              # Find which frame actually contains the login inputs
              print("Scanning all frames for inputs...")
              target = None
              for i, frame in enumerate(page.frames):
                  try:
                      n = frame.locator('input').count()
                      print(f"  Frame {i} ({frame.url[:80]}): {n} input(s)")
                      if n > 0 and target is None:
                          target = frame
                  except Exception as fe:
                      print(f"  Frame {i}: error — {fe}")

              if target is None:
                  print("No inputs found in any frame — trying main page")
                  target = page

              # Try to log in
              try:
                  target.wait_for_selector('input', timeout=30000)
                  inputs = target.locator('input').all()
                  text_inputs   = [x for x in inputs if x.get_attribute('type') in ('text', None, '')]
                  pw_inputs     = [x for x in inputs if x.get_attribute('type') == 'password']
                  print(f"Text inputs: {len(text_inputs)}, Password inputs: {len(pw_inputs)}")
                  if text_inputs and pw_inputs:
                      text_inputs[0].fill(USERNAME)
                      pw_inputs[0].fill(PASSWORD)
                      target.get_by_role("button", name="Log in").click()
                      print("Logged in ✅")
                      time.sleep(5)
                  else:
                      print("Could not find username/password fields")
              except Exception as e:
                  print(f"Login failed: {e}")

              print(f"Page title: {page.title()}")
              print("App is awake ✅")
              browser.close()
          EOF
