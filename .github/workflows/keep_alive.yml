name: Keep App Alive

on:
  schedule:
    # Ping every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: pip install playwright && playwright install chromium --with-deps

      - name: Wake up and log in to Planet Scope Viewer
        run: |
          python3 - <<'EOF'
          from playwright.sync_api import sync_playwright
          import time

          URL      = "https://planet-scope-water-mask-ruimdlgrctxawn9uyvmer2.streamlit.app/"
          USERNAME = "PSM_water"
          PASSWORD = "PSMsurfacewater"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()

              print(f"Opening {URL} ...")
              page.goto(URL, timeout=90000, wait_until="networkidle")
              time.sleep(5)

              # Click wake-up button if the app is sleeping
              try:
                  btn = page.get_by_text("Yes, get this app back up!", exact=False)
                  if btn.is_visible():
                      btn.click()
                      print("Clicked wake-up button — waiting for app to start...")
                      page.wait_for_load_state("networkidle", timeout=60000)
                      time.sleep(10)
              except Exception:
                  pass

              # Fill in the login form — wait for Streamlit to finish rendering
              try:
                  # Wait for any Streamlit text input wrapper to appear
                  page.wait_for_selector('[data-testid="stTextInput"]', timeout=60000)
                  page.locator('[data-testid="stTextInput"] input').first.fill(USERNAME)
                  page.locator('input[type="password"]').fill(PASSWORD)
                  page.get_by_role("button", name="Log in").click()
                  print("Logged in ✅")
                  time.sleep(5)
              except Exception as e:
                  print(f"Login step skipped or failed: {e}")

              print(f"Page title: {page.title()}")
              print("App is awake ✅")
              browser.close()
          EOF
